<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIFTY XGB-MASTER</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        .card {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .nifty-header {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .ltp {
            font-size: 36px;
            font-weight: bold;
        }
        .change {
            font-size: 16px;
            font-weight: bold;
        }
        .green { color: #00e676; }
        .red { color: #ff5252; }
        
        .section-title {
            text-align: center;
            font-size: 12px;
            color: #4fc3f7;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .levels-row {
            display: flex;
            justify-content: space-between;
            text-align: center;
        }
        .level-box p { margin: 5px 0; font-size: 12px; color: #888; }
        .level-box h3 { margin: 0; font-size: 20px; }
        
        .prob-bar {
            width: 100%;
            height: 12px;
            background-color: #333;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            margin-top: 10px;
        }
        .prob-bull { background-color: #00e676; transition: width 0.5s; }
        .prob-bear { background-color: #ff5252; transition: width 0.5s; }
        
        .signal-box {
            border-left: 4px solid #ffca28;
            padding-left: 15px;
        }
        .signal-box h3 { margin: 0 0 10px 0; color: #ffca28; font-size: 18px; }
        .signal-box p { margin: 5px 0; font-size: 14px; }
        
        .btn {
            background-color: #3f51b5;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:active { opacity: 0.8; }
        
        .sas-btn {
            background-color: transparent;
            color: #00e676;
            border: 1px solid #00e676;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: block;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
            margin-top: 15px;
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.1);
        }
        
        .footer-info {
            text-align: center;
            font-size: 11px;
            color: #666;
            margin-top: 20px;
        }
        .timer-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }
        .timer {
            background: #2a2a2a;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #00e676;
            font-weight: bold;
        }
        .timer.warning { color: #ff9800; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="border-bottom: 3px solid #00e676;" id="priceCard">
        <div class="nifty-header">NIFTY 50 • LIVE</div>
        <div class="price-row">
            <div class="ltp" id="ltp">0.00</div>
            <div class="change" id="change">0.00 (0.00%)</div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">🛡️ NSE ±500 OPTION LEVELS</div>
        <div class="levels-row">
            <div class="level-box">
                <p class="red">SUPPORT</p>
                <h3 id="support">-</h3>
            </div>
            <div class="level-box">
                <p class="green">RESISTANCE</p>
                <h3 id="resistance">-</h3>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">🧠 AI PROBABILITY SCORE</div>
        <div class="levels-row" style="margin-bottom: 5px;">
            <span style="font-size:12px; color:#00e676;" id="bullText">Bullish: 0%</span>
            <span style="font-size:12px; color:#ff5252;" id="bearText">Bearish: 0%</span>
        </div>
        <div class="prob-bar">
            <div class="prob-bull" id="bullBar" style="width: 50%;"></div>
            <div class="prob-bear" id="bearBar" style="width: 50%;"></div>
        </div>
    </div>

    <div class="card signal-box">
        <h3>🛒 Search: <span id="symbol">-</span></h3>
        <p>🟢 Entry: <span id="entry">-</span> | 🔴 SL: <span id="sl">-</span></p>
        <p>🎯 Target: <span id="t1">-</span> - <span id="t2">-</span></p>
    </div>

    <div class="timer-box">
        <button class="btn" onclick="fetchData()" style="width: 70%;">🔄 REFRESH LIVE DATA</button>
        <div class="timer" id="timerDisplay">00:00</div>
    </div>
    
    <a href="https://nifty-algo-api.onrender.com/api/sas_login" target="_blank" class="sas-btn">
        🔑 Connect SASOnline API
    </a>

    <div class="footer-info" id="sourceInfo">Source: Connecting... | Time: --:--</div>
</div>

<script>
    const API_URL = "https://nifty-algo-api.onrender.com/api/get_call";
    let lastFetchTime = new Date();

    async function fetchData() {
        const btn = document.querySelector('.btn');
        btn.innerHTML = "⏳ Fetching AI Data...";
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if(data.status === "success") {
                // Update Price
                document.getElementById('ltp').innerText = data.ltp;
                let changeText = `${data.change > 0 ? '+' : ''}${data.change} (${data.pct}%)`;
                let changeEl = document.getElementById('change');
                changeEl.innerText = changeText;
                
                if(data.change >= 0) {
                    changeEl.className = "change green";
                    document.getElementById('priceCard').style.borderBottom = "3px solid #00e676";
                } else {
                    changeEl.className = "change red";
                    document.getElementById('priceCard').style.borderBottom = "3px solid #ff5252";
                }

                // Update Levels
                document.getElementById('support').innerText = data.support;
                document.getElementById('resistance').innerText = data.resistance;

                // Update AI Score
                document.getElementById('bullText').innerText = `Bullish: ${data.bullish}%`;
                document.getElementById('bearText').innerText = `Bearish: ${data.bearish}%`;
                document.getElementById('bullBar').style.width = `${data.bullish}%`;
                document.getElementById('bearBar').style.width = `${data.bearish}%`;

                // Update Trade Info
                document.getElementById('symbol').innerText = data.broker_symbol;
                document.getElementById('entry').innerText = data.entry;
                document.getElementById('sl').innerText = data.sl;
                document.getElementById('t1').innerText = data.t1;
                document.getElementById('t2').innerText = data.t2;

                // Update Footer Source
                let now = new Date();
                document.getElementById('sourceInfo').innerText = `Source: ${data.data_source} | Time: ${now.toLocaleTimeString()}`;
                
                // Reset Timer
                lastFetchTime = new Date();
            } else {
                alert("API Error: " + data.message);
            }
        } catch (error) {
            alert("Failed to connect to Render Server!");
        }
        btn.innerHTML = "🔄 REFRESH LIVE DATA";
    }

    // Timer Logic
    setInterval(() => {
        let now = new Date();
        let diffMs = now - lastFetchTime;
        let diffMins = Math.floor(diffMs / 60000);
        let diffSecs = Math.floor((diffMs % 60000) / 1000);
        
        let timerEl = document.getElementById('timerDisplay');
        timerEl.innerText = `${String(diffMins).padStart(2, '0')}:${String(diffSecs).padStart(2, '0')}`;
        
        if(diffMins >= 5) {
            timerEl.classList.add('warning');
        } else {
            timerEl.classList.remove('warning');
        }
    }, 1000);

    // Initial Fetch
    fetchData();
</script>

</body>
</html>
