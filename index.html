<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty AI Master Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0c0c0c; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .dashboard { background: #181818; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #2a2a2a; box-shadow: 0 15px 60px rgba(0,0,0,0.9); }
        .index-card { background: #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-bottom: 5px solid #444; }
        .ltp { font-size: 34px; font-weight: bold; }
        .setup-box { background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .setup-title { color: #4fc3f7; font-size: 11px; font-weight: bold; margin-bottom: 12px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; }
        .call-box { background: #262626; padding: 20px; border-radius: 12px; border-left: 6px solid #444; line-height: 1.8; margin-bottom: 20px; }
        .prog-container { width: 100%; background: #333; height: 12px; border-radius: 6px; overflow: hidden; display: flex; margin-top: 10px; }
        .action-row { display: flex; gap: 10px; }
        button { flex: 3; padding: 16px; background: #3949ab; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .timer-tab { flex: 1; background: #222; border: 1px solid #444; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .info-bar { font-size: 11px; color: #555; text-align: center; margin-top: 25px; border-top: 1px dashed #333; padding-top: 12px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="index-card" id="idxCard">
        <div style="color:#888; font-size:12px; margin-bottom:5px; font-weight:bold;">NIFTY 50 • LIVE</div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="ltp" id="idxLtp">0.00</div>
            <div id="idxChange" style="font-weight:bold; font-size:14px;">0.00%</div>
        </div>
    </div>

    <div class="setup-box">
        <div class="setup-title">🛡️ NSE ±500 OPTION LEVELS</div>
        <div style="display:flex; justify-content:space-between; text-align:center; padding: 5px 10px;">
            <div><div style="font-size:10px; color:#ff5252;">SUPPORT</div><div id="supVal" style="font-size:18px; font-weight:bold;">-</div></div>
            <div><div style="font-size:10px; color:#00e676;">RESISTANCE</div><div id="resVal" style="font-size:18px; font-weight:bold;">-</div></div>
        </div>
    </div>

    <div class="setup-box">
        <div class="setup-title">🧠 AI PROBABILITY SCORE</div>
        <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold;">
            <span style="color:#00e676;">Bullish: <span id="bullPerc">0</span>%</span>
            <span style="color:#ff5252;">Bearish: <span id="bearPerc">0</span>%</span>
        </div>
        <div class="prog-container">
            <div id="bullBar" style="width: 50%; background: #00e676; transition: 0.8s;"></div>
            <div id="bearBar" style="width: 50%; background: #ff5252; transition: 0.8s;"></div>
        </div>
    </div>

    <div class="call-box" id="tradeCall">డేటా లోడ్ అవుతోంది...</div>

    <div class="action-row">
        <button onclick="fetchData()">🔄 REFRESH LIVE DATA</button>
        <div class="timer-tab">
            <span style="font-size:9px; color:#888; font-weight:bold;">LAST</span>
            <span id="timerText" style="color:#00e676; font-weight:bold; font-size:15px;">00:00</span>
        </div>
    </div>

    <div class="info-bar">
        Source: <span id="srcText">Connecting...</span> | Time: <span id="timeText">--:--</span>
    </div>
</div>

<script>
    let seconds = 0;
    let interval;

    function startTimer() {
        clearInterval(interval);
        seconds = 0;
        interval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds/60).toString().padStart(2,'0');
            let s = (seconds%60).toString().padStart(2,'0');
            document.getElementById("timerText").innerText = `${m}:${s}`;
        }, 1000);
    }

    function fetchData() {
        document.getElementById("srcText").innerText = "Updating...";
        // 🔥 మీ Render URL ఇక్కడ కనెక్ట్ చేయబడింది
        fetch('https://nifty-algo-api.onrender.com/api/get_call') 
            .then(r => r.json())
            .then(d => {
                if(d.status === "success") {
                    document.getElementById("idxLtp").innerText = d.ltp;
                    document.getElementById("idxChange").innerText = `${d.change > 0 ? '+' : ''}${d.change} (${d.pct}%)`;
                    document.getElementById("idxChange").style.color = d.change >= 0 ? "#00e676" : "#ff5252";
                    document.getElementById("idxCard").style.borderBottomColor = d.change >= 0 ? "#00e676" : "#ff5252";
                    
                    document.getElementById("supVal").innerText = d.support;
                    document.getElementById("resVal").innerText = d.resistance;
                    document.getElementById("bullPerc").innerText = d.bullish;
                    document.getElementById("bearPerc").innerText = d.bearish;
                    document.getElementById("bullBar").style.width = d.bullish + "%";
                    document.getElementById("bearBar").style.width = d.bearish + "%";
                    
                    document.getElementById("tradeCall").innerHTML = `
                        <div style="color:#ffd54f; font-weight:bold; font-size:19px; margin-bottom:10px;">🛒 Search: ${d.broker_symbol}</div>
                        <div style="font-size:14px;">• 🟢 Entry: ${d.entry} | 🛑 SL: ${d.sl}</div>
                        <div style="font-size:14px;">• 🎯 Target: ${d.t1} - ${d.t2}</div>
                    `;
                    
                    let opType = d.broker_symbol.split(' ').pop();
                    document.getElementById("tradeCall").style.borderLeftColor = (opType === "CE") ? "#00e676" : "#ff5252";
                    
                    document.getElementById("srcText").innerText = d.data_source;
                    document.getElementById("timeText").innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    startTimer();
                }
            })
            .catch(err => { document.getElementById("srcText").innerText = "Server Offline"; });
    }
    window.onload = fetchData;
</script>
</body>
</html>
