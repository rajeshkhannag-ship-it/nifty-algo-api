<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIFTY XGB-MASTER: HEDGE FUND EDITION</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 400px; width: 100%; }
        .card { background-color: #1e1e1e; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .nifty-header { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .price-row { display: flex; justify-content: space-between; align-items: baseline; }
        .ltp { font-size: 36px; font-weight: bold; }
        .change { font-size: 16px; font-weight: bold; }
        .green { color: #00e676; }
        .red { color: #ff5252; }
        .section-title { text-align: center; font-size: 12px; color: #4fc3f7; margin-bottom: 15px; letter-spacing: 1px; }
        .levels-row { display: flex; justify-content: space-between; text-align: center; }
        .level-box p { margin: 5px 0; font-size: 12px; color: #888; }
        .level-box h3 { margin: 0; font-size: 20px; }
        .prob-bar { width: 100%; height: 12px; background-color: #333; border-radius: 6px; overflow: hidden; display: flex; margin-top: 10px; }
        .prob-bull { background-color: #00e676; transition: width 0.5s; }
        .prob-bear { background-color: #ff5252; transition: width 0.5s; }
        .signal-box { border-left: 4px solid #ffca28; padding-left: 15px; }
        .signal-box h3 { margin: 0 0 10px 0; color: #ffca28; font-size: 18px; }
        .signal-box p { margin: 5px 0; font-size: 14px; }
        .btn { background-color: #3f51b5; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; box-sizing: border-box; }
        .btn:active { opacity: 0.8; }
        .footer-info { text-align: center; font-size: 11px; color: #666; margin-top: 20px; line-height: 1.5; }
        .timer-box { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .timer { background: #2a2a2a; padding: 10px 15px; border-radius: 8px; font-size: 14px; color: #00e676; font-weight: bold; }
        .auto-refresh-text { font-size: 10px; color: #888; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="border-bottom: 3px solid #00e676;" id="priceCard">
        <div class="nifty-header">NIFTY 50 • LIVE</div>
        <div class="price-row">
            <div class="ltp" id="ltp">0.00</div>
            <div class="change" id="change">0.00 (0.00%)</div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">🛡️ NSE OPTION LEVELS</div>
        <div class="levels-row">
            <div class="level-box"><p class="red">SUPPORT</p><h3 id="support">-</h3></div>
            <div class="level-box"><p class="green">RESISTANCE</p><h3 id="resistance">-</h3></div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">🧠 AI PROBABILITY SCORE</div>
        <div class="levels-row" style="margin-bottom: 5px;">
            <span style="font-size:12px; color:#00e676;" id="bullText">Bullish: 0%</span>
            <span style="font-size:12px; color:#ff5252;" id="bearText">Bearish: 0%</span>
        </div>
        <div class="prob-bar">
            <div class="prob-bull" id="bullBar" style="width: 50%;"></div>
            <div class="prob-bear" id="bearBar" style="width: 50%;"></div>
        </div>
    </div>

    <div class="card signal-box">
        <h3>🛒 Search: <span id="symbol">-</span></h3>
        <p>🟢 Entry: <span id="entry">-</span> | 🔴 SL: <span id="sl">-</span></p>
        <p>🎯 Target: <span id="t1">-</span> - <span id="t2">-</span></p>
    </div>

    <div class="timer-box">
        <button class="btn" id="refreshBtn" onclick="fetchData()" style="width: 70%;">🔄 REFRESH LIVE DATA</button>
        <div class="timer" id="timerDisplay">00:00</div>
    </div>
    <div class="auto-refresh-text" id="nextRefreshText">Auto-refreshing in...</div>
    
    <div class="footer-info" id="sourceInfo">
        Source: Connecting... <br>
        Time: --:--
    </div>
</div>

<script>
    const API_URL = "https://nifty-algo-api.onrender.com/api/get_call";
    let lastFetchTime = new Date();
    let nextAutoRefreshSeconds = getRandomInt(180, 185); 

    function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    async function fetchData() {
        const btn = document.getElementById('refreshBtn');
        btn.innerHTML = "⏳ Fetching AI Data...";
        btn.style.backgroundColor = "#555"; 
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if(data.status === "success") {
                document.getElementById('ltp').innerText = data.ltp;
                let changeText = `${data.change > 0 ? '+' : ''}${data.change} (${data.pct}%)`;
                let changeEl = document.getElementById('change');
                changeEl.innerText = changeText;
                
                if(data.change >= 0) {
                    changeEl.className = "change green";
                    document.getElementById('priceCard').style.borderBottom = "3px solid #00e676";
                } else {
                    changeEl.className = "change red";
                    document.getElementById('priceCard').style.borderBottom = "3px solid #ff5252";
                }

                document.getElementById('support').innerText = data.support;
                document.getElementById('resistance').innerText = data.resistance;

                document.getElementById('bullText').innerText = `Bullish: ${data.bullish}%`;
                document.getElementById('bearText').innerText = `Bearish: ${data.bearish}%`;
                document.getElementById('bullBar').style.width = `${data.bullish}%`;
                document.getElementById('bearBar').style.width = `${data.bearish}%`;

                document.getElementById('symbol').innerText = data.broker_symbol;
                document.getElementById('entry').innerText = data.entry;
                document.getElementById('sl').innerText = data.sl;
                document.getElementById('t1').innerText = data.t1;
                document.getElementById('t2').innerText = data.t2;

                let now = new Date();
                document.getElementById('sourceInfo').innerHTML = `Source: <b style="color:#00e676;">${data.data_source}</b> <br> Time: ${now.toLocaleTimeString()}`;
                
                lastFetchTime = new Date();
                nextAutoRefreshSeconds = getRandomInt(180, 185);
            } else { console.log("API Error: " + data.message); }
        } catch (error) { console.log("Retrying connection..."); }
        
        btn.innerHTML = "🔄 REFRESH LIVE DATA";
        btn.style.backgroundColor = "#3f51b5";
    }

    setInterval(() => {
        let now = new Date();
        let diffMs = now - lastFetchTime;
        let totalSeconds = Math.floor(diffMs / 1000);
        let diffMins = Math.floor(totalSeconds / 60);
        let diffSecs = totalSeconds % 60;
        
        let timerEl = document.getElementById('timerDisplay');
        timerEl.innerText = `${String(diffMins).padStart(2, '0')}:${String(diffSecs).padStart(2, '0')}`;
        
        let remainingSeconds = nextAutoRefreshSeconds - totalSeconds;
        if(remainingSeconds > 0) {
            document.getElementById('nextRefreshText').innerText = `Auto-refresh in ${remainingSeconds}s (Zig-Zag Target: ${nextAutoRefreshSeconds}s)`;
        } else {
            document.getElementById('nextRefreshText').innerText = "Refreshing now...";
        }
        
        if(totalSeconds >= nextAutoRefreshSeconds) { fetchData(); }
    }, 1000);

    fetchData();
</script>

</body>
</html>
