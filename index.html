<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HEDGE FUND TERMINAL</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .dashboard { max-width: 800px; width: 100%; display: grid; gap: 15px; grid-template-columns: 1fr; }
        @media (min-width: 600px) { .dashboard { grid-template-columns: 1fr 1fr; } .full-width { grid-column: span 2; } }
        
        .card { background-color: #161b22; border-radius: 12px; padding: 20px; border: 1px solid #30363d; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .card-title { font-size: 12px; color: #58a6ff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 5px;}
        
        .ltp-box { text-align: center; position: relative; }
        .ltp { font-size: 48px; font-weight: bold; color: #3fb950; margin: 10px 0;}
        
        /* ALERT BANNER CSS */
        .alert-banner { display: none; background-color: #f85149; color: white; padding: 10px; font-weight: bold; text-align: center; border-radius: 8px; margin-top: 10px; animation: blinker 1s linear infinite; }
        .alert-ce { background-color: #3fb950; }
        @keyframes blinker { 50% { opacity: 0; } }

        .snr-row { display: flex; justify-content: space-between; text-align: center; }
        .level-box p { margin: 0 0 5px 0; font-size: 12px; color: #8b949e; }
        .level-box h3 { margin: 0; font-size: 26px; font-weight: bold; }
        .green { color: #3fb950; } .red { color: #f85149; }

        .idx-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .idx-item p { margin: 0; font-size: 10px; color: #8b949e; text-transform: uppercase;}
        .idx-item h4 { margin: 5px 0 0 0; font-size: 13px; color: #fff; }

        .fii-box { text-align: center; font-size: 18px; padding: 10px; background: #21262d; border-radius: 8px;}
        
        .vol-list { list-style: none; padding: 0; margin: 0; }
        .vol-list li { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid #30363d; }
        .vol-list li:last-child { border-bottom: none; }

        .btn { background-color: #1f6feb; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card ltp-box full-width" style="border-top: 3px solid #3fb950;">
        <div class="card-title">NIFTY 50 • LIVE SPOT</div>
        <div class="ltp" id="ltp">Loading...</div>
        <div id="alertBox" class="alert-banner">🚨 ALERT MESSAGE 🚨</div>
    </div>

    <div class="card">
        <div class="card-title">🛡️ NSE Option Levels (S&R)</div>
        <div class="snr-row">
            <div class="level-box"><p class="red">SUPPORT</p><h3 id="support" class="green">-</h3></div>
            <div class="level-box"><p class="green">RESISTANCE</p><h3 id="resistance" class="red">-</h3></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📈 Market Pulse</div>
        <div class="idx-grid">
            <div class="idx-item"><p>NIFTY 50</p><h4 id="idx-nifty">--</h4></div>
            <div class="idx-item"><p>BANK NIFTY</p><h4 id="idx-bank">--</h4></div>
            <div class="idx-item"><p>NIFTY IT</p><h4 id="idx-it">--</h4></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">🏦 FII/DII Flow (Latest)</div>
        <div class="fii-box" id="fii-box">Waiting for data...</div>
    </div>

    <div class="card">
        <div class="card-title">📊 Top Volume Gainers</div>
        <ul class="vol-list" id="vol-list"><li><span>Loading...</span><span>--</span></li></ul>
    </div>

    <div class="card full-width" style="padding: 15px;">
        <button class="btn" id="refreshBtn" onclick="fetchData()">🔄 REFRESH LIVE DASHBOARD</button>
    </div>
</div>

<script>
    const API_URL = "https://nifty-algo-api.onrender.com/api/get_call";
    let lastSignal = "NONE";

    // 🔊 AUDIO BEEP LOGIC
    function playBeep() {
        try {
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = ctx.createOscillator();
            let gainNode = ctx.createGain();
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            osc.type = "sine";
            osc.frequency.value = 850; 
            gainNode.gain.setValueAtTime(0.5, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
        } catch(e) { console.log("Audio blocked"); }
    }
    
    async function fetchData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if(data.status === "success") {
                document.getElementById('ltp').innerText = data.ltp;
                document.getElementById('support').innerText = data.support;
                document.getElementById('resistance').innerText = data.resistance;

                // 🚨 ALERT CHECK
                let alertBox = document.getElementById('alertBox');
                if(data.signal !== "NONE") {
                    alertBox.style.display = "block";
                    alertBox.innerText = "🚨 " + data.alert_msg;
                    alertBox.className = data.signal === "BUY_CE" ? "alert-banner alert-ce" : "alert-banner";

                    // Play beep only once per new signal trigger
                    if(lastSignal !== data.signal) {
                        playBeep();
                        lastSignal = data.signal;
                    }
                } else {
                    alertBox.style.display = "none";
                    lastSignal = "NONE";
                }

                if(data.intelligence.indices.nifty) {
                    document.getElementById('idx-nifty').innerText = data.intelligence.indices.nifty;
                    document.getElementById('idx-bank').innerText = data.intelligence.indices.bank;
                    document.getElementById('idx-it').innerText = data.intelligence.indices.it;
                }

                if(data.intelligence.fii_dii) {
                    let fii = data.intelligence.fii_dii;
                    let color = fii.net > 0 ? '#3fb950' : '#f85149';
                    document.getElementById('fii-box').innerHTML = `<span style="font-size: 14px; color:#8b949e">${fii.date}</span><br>Net: <b style="color:${color}">₹${fii.net} Cr</b> <br><span style="font-size: 15px;">${fii.status}</span>`;
                }

                if(data.intelligence.vol_gainers && data.intelligence.vol_gainers.length > 0) {
                    let volHtml = "";
                    data.intelligence.vol_gainers.forEach(v => {
                        volHtml += `<li><span>${v.symbol}</span><span style="color:#58a6ff">₹${v.last_price}</span></li>`;
                    });
                    document.getElementById('vol-list').innerHTML = volHtml;
                }
            }
        } catch (error) { console.log("Error fetching data"); }
    }

    setInterval(fetchData, 180000);
    fetchData();
</script>

</body>
</html>
