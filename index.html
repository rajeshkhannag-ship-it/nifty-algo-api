<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HEDGE FUND TERMINAL</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .dashboard { max-width: 600px; width: 100%; display: grid; gap: 15px; }
        
        .card { background-color: #161b22; border-radius: 12px; padding: 20px; border: 1px solid #30363d; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .card-title { font-size: 12px; color: #58a6ff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 5px;}
        
        .ltp-box { text-align: center; }
        .ltp { font-size: 48px; font-weight: bold; color: #3fb950; margin: 10px 0;}
        
        .snr-row { display: flex; justify-content: space-between; text-align: center; }
        .level-box p { margin: 0 0 5px 0; font-size: 12px; color: #8b949e; }
        .level-box h3 { margin: 0; font-size: 26px; font-weight: bold; }
        .green { color: #3fb950; } .red { color: #f85149; }

        /* Signal Box Styles */
        .signal-box { background-color: #21262d; border-left: 5px solid #d29922; text-align: center; display: none; animation: pulse 2s infinite; }
        .sig-type { font-size: 24px; font-weight: bold; color: #d29922; margin-bottom: 5px;}
        .sig-name { font-size: 18px; color: #fff; margin-bottom: 15px; }
        .sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 16px; font-weight: bold;}
        .sig-grid div { background: #0d1117; padding: 10px; border-radius: 6px; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(210, 153, 34, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(210, 153, 34, 0); } 100% { box-shadow: 0 0 0 0 rgba(210, 153, 34, 0); } }

        .btn { background-color: #1f6feb; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:active { background-color: #388bfd; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card ltp-box" style="border-top: 3px solid #3fb950;">
        <div class="card-title">NIFTY 50 • LIVE SPOT <span id="pcr-badge" style="float:right; color:#fff;">PCR: --</span></div>
        <div class="ltp" id="ltp">Loading...</div>
    </div>

    <div class="card">
        <div class="card-title">🛡️ NSE Option Levels (S&R)</div>
        <div class="snr-row">
            <div class="level-box"><p class="red">SUPPORT</p><h3 id="support" class="green">-</h3></div>
            <div class="level-box"><p class="green">RESISTANCE</p><h3 id="resistance" class="red">-</h3></div>
        </div>
    </div>

    <div class="card signal-box" id="signal-card">
        <div class="sig-type" id="sig-type">📢 BUY CALL</div>
        <div class="sig-name" id="sig-name">NIFTY 30 MAR 2026 22500 CE</div>
        
        <div style="font-size: 20px; color: #fff; margin-bottom: 10px;">Entry / Trigger: ₹<span id="sig-entry">0</span></div>
        
        <div class="sig-grid">
            <div style="color: #3fb950;">Target 1: ₹<span id="sig-t1">0</span></div>
            <div style="color: #3fb950;">Target 2: ₹<span id="sig-t2">0</span></div>
            <div style="color: #f85149; grid-column: span 2;">Stop Loss: ₹<span id="sig-sl">0</span></div>
        </div>
    </div>

    <div class="card" style="padding: 15px;">
        <button class="btn" id="refreshBtn" onclick="fetchData()">🔄 REFRESH LIVE DASHBOARD</button>
        <div style="text-align: center; font-size: 11px; color: #666; margin-top: 10px;" id="sourceInfo">Auto-refresh active | Time: --:--</div>
    </div>
</div>

<script>
    const API_URL = "https://nifty-algo-api.onrender.com/api/get_call";
    let lastSignalName = ""; // To prevent continuous beeping for the same signal
    let audioCtx = null;

    // Beep Sound Generator
    function playBeep() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); // High pitch beep
            
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        } catch (e) { console.log("Audio play blocked by browser."); }
    }

    async function fetchData() {
        const btn = document.getElementById('refreshBtn');
        btn.innerHTML = "⏳ Scanning Option Chain...";
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if(data.status === "success") {
                document.getElementById('ltp').innerText = data.ltp;
                document.getElementById('support').innerText = data.support;
                document.getElementById('resistance').innerText = data.resistance;
                document.getElementById('pcr-badge').innerText = `PCR: ${data.pcr}`;

                // SIGNAL LOGIC
                if (data.signal) {
                    document.getElementById('signal-card').style.display = 'block';
                    document.getElementById('sig-type').innerText = data.signal.type;
                    document.getElementById('sig-name').innerText = data.signal.name;
                    document.getElementById('sig-entry').innerText = data.signal.entry;
                    document.getElementById('sig-t1').innerText = data.signal.t1;
                    document.getElementById('sig-t2').innerText = data.signal.t2;
                    document.getElementById('sig-sl').innerText = data.signal.sl;

                    // Play beep ONLY if it's a new signal
                    if (data.signal.name !== lastSignalName) {
                        playBeep();
                        lastSignalName = data.signal.name;
                    }
                } else {
                    document.getElementById('signal-card').style.display = 'none';
                    lastSignalName = ""; // Reset if signal disappears
                }

                let now = new Date();
                document.getElementById('sourceInfo').innerHTML = `Last Sync: ${now.toLocaleTimeString()}`;
            }
        } catch (error) { console.log("Retrying connection..."); }
        
        btn.innerHTML = "🔄 REFRESH LIVE DASHBOARD";
    }

    // Auto refresh every 3 minutes
    setInterval(fetchData, 180000);
    
    // User needs to click somewhere on page to allow audio to play
    document.body.addEventListener('click', () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }, { once: true });

    fetchData();
</script>

</body>
</html>
